name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (Optional check-out to verify commit details)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 5m
          command_timeout: 15m
          script: |
            set -e
            # Di chuyển vào thư mục dự án trên EC2
            cd /home/ubuntu/salon-root
            
            # Sửa quyền sở hữu thư mục về ubuntu:ubuntu
            sudo chown -R ubuntu:ubuntu .
            
            # Xóa các file lock Git bị kẹt nếu có
            rm -f .git/index.lock .git/ORIG_HEAD.lock .git/HEAD.lock
            
            # Fetch và reset cứng về origin/main để đảm bảo lấy mã nguồn sạch từ GitHub
            git fetch origin main
            git reset --hard origin/main
            
            # Dừng và xóa các container cũ
            sudo docker compose down --remove-orphans
            
            # Xây dựng và khởi chạy lại các container ở dạng background
            sudo docker compose up -d --build
            
            # Dọn dẹp các Docker image rác/không dùng để giải phóng đĩa cứng
            sudo docker system prune -f
