server {
    server_name salonduongchi.website www.salonduongchi.website;

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:8080/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8080; # Cổng host của frontend container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/salonduongchi.website/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/salonduongchi.website/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    server_name api.salonduongchi.website;

    location / {
        proxy_pass http://127.0.0.1:5000; # Cổng host của backend api container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hỗ trợ WebSockets (Real-time updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/salonduongchi.website/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/salonduongchi.website/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = www.salonduongchi.website) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = salonduongchi.website) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name salonduongchi.website www.salonduongchi.website;
    return 404; # managed by Certbot




}

server {
    if ($host = api.salonduongchi.website) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.salonduongchi.website;
    return 404; # managed by Certbot


}
