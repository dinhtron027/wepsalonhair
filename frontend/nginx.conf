server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  location = /sitemap.xml {
    try_files /sitemap.xml =404;
  }

  location = /robots.txt {
    try_files /robots.txt =404;
  }

  # Hashed assets cache control (1 year immutable)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Normal root router fallback
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }

  # Cache other static media files for 7 days
  location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com https://*.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.salonduongchi.website wss://api.salonduongchi.website http://localhost:* ws://localhost:*; frame-src 'self' https://accounts.google.com https://www.google.com https://maps.google.com; media-src 'self' https://cdn.coverr.co;" always;
}
