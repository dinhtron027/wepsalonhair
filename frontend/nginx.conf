server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /sitemap.xml {
    try_files /sitemap.xml =404;
  }

  location = /robots.txt {
    try_files /robots.txt =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://res.cloudinary.com https://images.unsplash.com https://*.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.salonduongchi.website wss://api.salonduongchi.website http://localhost:* ws://localhost:*; frame-src 'self' https://accounts.google.com; media-src 'self' https://cdn.coverr.co;" always;
}
